<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lịch sử hoạt động — Recsys Shop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/shopee.css">
</head>
<body>

  <!-- ═══════════ HEADER ═══════════ -->
  <header class="header">
    <div class="header-top">
      <span id="welcome-text"></span>
      <a href="#" id="logout-link" class="hidden" onclick="logout();return false;">Đăng xuất</a>
    </div>
    <div class="header-main">
      <a href="/" class="logo">🛒 Recsys Shop</a>
      <div class="search-box">
        <input type="text" id="search-input" placeholder="Tìm sản phẩm...">
        <button onclick="goToSearch()">🔍 Tìm kiếm</button>
      </div>
      <div class="user-menu" id="user-menu"></div>
    </div>
  </header>

  <!-- ═══════════ MAIN ═══════════ -->
  <main class="container" style="padding-top:20px;">
    <section class="section">
      <div class="section-header">
        <h2>📋 Lịch sử hoạt động</h2>
        <span class="history-count-badge" id="history-count"></span>
      </div>

      <!-- Tabs -->
      <div class="history-tabs">
        <button class="htab active" data-action="">🗂 Tất cả</button>
        <button class="htab" data-action="view">👁 Đã xem</button>
        <button class="htab" data-action="cart">🛒 Đã thêm giỏ</button>
        <button class="htab" data-action="rate">⭐ Đã đánh giá</button>
      </div>

      <div id="history-list" class="history-list">
        <div class="empty-msg">Đang tải...</div>
      </div>
    </section>
  </main>

  <!-- Loading -->
  <div id="loading" class="loading hidden"><div class="spinner"></div></div>

  <script src="/js/auth.js"></script>
  <script src="/js/history.js"></script>
  <script>initHistoryPage();</script>
</body>
</html>
